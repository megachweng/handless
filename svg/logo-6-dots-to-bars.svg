<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Option 6: Dots to Bars — gradient from idle dots to active bars -->
  <!-- Left side: small circles (idle state), right side: tall bars (speaking state) -->
  <!-- Captures the animation transition in a single static image -->
  <rect x="4" y="4" width="120" height="120" rx="28" fill="#141414"/>
  <rect x="4" y="4" width="120" height="120" rx="28" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <g transform="translate(20, 64)">
    <!-- 11 elements: dots gradually becoming taller bars -->
    <!-- bar width=5, gap=3.5, total ≈ 90 -->
    <!-- Element 1: pure dot -->
    <circle cx="2.5" cy="0" r="2.5" fill="#ff8c00" opacity="0.35"/>
    <!-- Element 2: slightly taller dot -->
    <rect x="8.5"  y="-3"  width="5" height="6"  rx="2.5" fill="#ff8c00" opacity="0.4"/>
    <!-- Element 3: small bar -->
    <rect x="17"   y="-4"  width="5" height="8"  rx="2.5" fill="#ff8c00" opacity="0.45"/>
    <!-- Element 4 -->
    <rect x="25.5" y="-6"  width="5" height="12" rx="2.5" fill="#ff8c00" opacity="0.5"/>
    <!-- Element 5 -->
    <rect x="34"   y="-9"  width="5" height="18" rx="2.5" fill="#ff8c00" opacity="0.58"/>
    <!-- Element 6 -->
    <rect x="42.5" y="-13" width="5" height="26" rx="2.5" fill="#ff8c00" opacity="0.65"/>
    <!-- Element 7 -->
    <rect x="51"   y="-17" width="5" height="34" rx="2.5" fill="#ff8c00" opacity="0.72"/>
    <!-- Element 8 -->
    <rect x="59.5" y="-21" width="5" height="42" rx="2.5" fill="#ff8c00" opacity="0.8"/>
    <!-- Element 9 -->
    <rect x="68"   y="-25" width="5" height="50" rx="2.5" fill="#ff8c00" opacity="0.87"/>
    <!-- Element 10 -->
    <rect x="76.5" y="-29" width="5" height="58" rx="2.5" fill="#ff8c00" opacity="0.94"/>
    <!-- Element 11: tallest bar -->
    <rect x="85"   y="-33" width="5" height="66" rx="2.5" fill="#ff8c00" opacity="1"/>
  </g>
</svg>