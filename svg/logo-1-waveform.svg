    <rect x="14" y="-13" width="4" height="26" rx="2" fill="#ff8c00" opacity="0.7"/>
    <rect x="21" y="-20" width="4" height="40" rx="2" fill="#ff8c00" opacity="0.8"/>
    <rect x="28" y="-27" width="4" height="54" rx="2" fill="#ff8c00" opacity="0.9"/>
    <rect x="35" y="-31" width="4" height="62" rx="2" fill="#ff8c00" opacity="1"/>
    <rect x="42" y="-27" width="4" height="54" rx="2" fill="#ff8c00" opacity="0.9"/>
    <rect x="49" y="-20" width="4" height="40" rx="2" fill="#ff8c00" opacity="0.8"/>
    <rect x="56" y="-13" width="4" height="26" rx="2" fill="#ff8c00" opacity="0.7"/>
    <rect x="63" y="-7"  width="4" height="14" rx="2" fill="#ff8c00" opacity="0.6"/>
    <rect x="70" y="-3"  width="4" height="6"  rx="2" fill="#ff8c00" opacity="0.5"/>
  </g>
