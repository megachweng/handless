name: "Release"

on: workflow_dispatch

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release-id: ${{ steps.create-release.outputs.result }}
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get version from tauri.conf.json
        id: get-version
        shell: bash
        run: |
          VERSION=$(grep -o '"version": "[^"]*"' src-tauri/tauri.conf.json | cut -d'"' -f4)
          echo "Application version from tauri.conf.json: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check for existing release and clean up stale drafts
        uses: actions/github-script@v8
        with:
          script: |
            const tag = `v${{ steps.get-version.outputs.version }}`;
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            for (const release of releases.data) {
              if (release.tag_name !== tag) continue;
              if (!release.draft) {
                core.setFailed(`Published release ${tag} already exists. Bump the version in tauri.conf.json first.`);
                return;
              }
              console.log(`Deleting stale draft release ${release.id}`);
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id
              });
            }

      - name: Extract release notes from CHANGELOG.md
        id: release-notes
        shell: bash
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          # Extract the section between ## [VERSION] and the next ## [
          NOTES=$(sed -n "/^## \[${VERSION}\]/,/^## \[/{/^## \[${VERSION}\]/d;/^## \[/d;p;}" CHANGELOG.md)
          # Trim leading/trailing blank lines
          NOTES=$(echo "$NOTES" | sed -e '/./,$!d' -e :a -e '/^\n*$/{$d;N;ba;}')
          echo "Release notes for v${VERSION}:"
          echo "$NOTES"
          {
            echo "notes<<NOTES_EOF"
            echo "$NOTES"
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Draft Release
        id: create-release
        uses: actions/github-script@v8
        env:
          RELEASE_NOTES: ${{ steps.release-notes.outputs.notes }}
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${{ steps.get-version.outputs.version }}`,
              name: `v${{ steps.get-version.outputs.version }}`,
              body: process.env.RELEASE_NOTES,
              draft: true,
              prerelease: false
            })
            return data.id

  publish-tauri:
    permissions:
      contents: write
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-26" # for Arm based macs (M1 and above). Uses macOS 26 for Apple Intelligence SDK.
            args: "--target aarch64-apple-darwin"
            target: "aarch64-apple-darwin"
            label: "apple-silicon"
          - platform: "macos-latest" # for Intel based macs.
            args: "--target x86_64-apple-darwin"
            target: "x86_64-apple-darwin"
            label: "intel"
          # - platform: "ubuntu-22.04" # Build .deb on 22.04
          #   args: "--bundles deb"
          #   target: "x86_64-unknown-linux-gnu"
          # - platform: "ubuntu-24.04" # Build AppImage and RPM on 24.04
          #   args: "--bundles appimage,rpm"
          #   target: "x86_64-unknown-linux-gnu"
          # - platform: "ubuntu-24.04-arm" # Build for ARM64 Linux
          #   args: "--bundles appimage,deb,rpm"
          #   target: "aarch64-unknown-linux-gnu"
          # - platform: "windows-latest"
          #   args: ""
          #   target: "x86_64-pc-windows-msvc"
          # - platform: "windows-11-arm" # for ARM64 Windows runner
          #   args: "--target aarch64-pc-windows-msvc"
          #   target: "aarch64-pc-windows-msvc"

    uses: ./.github/workflows/build.yml
    with:
      platform: ${{ matrix.platform }}
      target: ${{ matrix.target }}
      build-args: ${{ matrix.args }}
      sign-binaries: true
      asset-prefix: ""
      asset-name-pattern: "[name]_[version]_${{ matrix.label }}[ext]"
      upload-artifacts: false
      release-id: ${{ needs.create-release.outputs.release-id }}
    secrets: inherit

  publish-release:
    permissions:
      contents: write
    needs: [create-release, publish-tauri]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.TAP_GITHUB_TOKEN }}
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release-id }},
              draft: false
            })
